name: Deploy Nodejs code on AWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy on AWS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 54.227.6.11
          username: ubuntu
          key: ${{secrets.PRIVATE_KEY}}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            node -v
            npm -v

            cd /home/ubuntu/cicd-basic-
            git pull
            npm install
            pm2 restart 0
